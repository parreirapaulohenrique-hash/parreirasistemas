<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WMS Coletor — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f172a; --card: #1e293b; --border: rgba(255,255,255,.09);
            --primary: #0ea5e9; --text: #f1f5f9; --sec: #94a3b8;
        }
        html, body {
            height: 100%; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
        }
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 1.5rem;
            background:
                radial-gradient(ellipse at 30% 30%, rgba(14,165,233,.1) 0%, transparent 55%),
                var(--bg);
        }

        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-icon {
            width: 64px; height: 64px; border-radius: 16px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto .85rem;
            box-shadow: 0 6px 20px rgba(14,165,233,.35);
        }
        .brand-icon .material-icons-round { font-size: 2rem; color: #fff; }
        .brand h1 { font-size: 1.2rem; font-weight: 700; }
        .brand p  { font-size: .78rem; color: var(--sec); }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 1.75rem;
            width: 100%; max-width: 360px;
            box-shadow: 0 16px 48px rgba(0,0,0,.5);
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }

        /* Campo */
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: .78rem; color: var(--sec); font-weight: 500; margin-bottom: .4rem; }
        .fi { position: relative; display: flex; align-items: center; }
        .fi .material-icons-round {
            position: absolute; left: .85rem; font-size: 1.15rem;
            color: var(--sec); pointer-events: none;
        }
        .fi input {
            width: 100%; background: rgba(255,255,255,.05);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text); font-family: inherit;
            font-size: 1.05rem; font-weight: 500;
            padding: .85rem .85rem .85rem 2.8rem;
            outline: none; transition: border-color .2s;
        }
        .fi input:focus { border-color: var(--primary); }
        .fi input::placeholder { color: rgba(255,255,255,.2); font-weight: 400; }

        /* Botão entrar */
        .btn-enter {
            width: 100%; background: var(--primary); color: #fff; border: none;
            border-radius: 12px; font-family: inherit; font-size: 1.05rem;
            font-weight: 700; padding: 1rem; cursor: pointer; margin-top: .5rem;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
            transition: background .2s; box-shadow: 0 4px 16px rgba(14,165,233,.3);
            touch-action: manipulation;
        }
        .btn-enter:hover { background: #0284c7; }
        .btn-enter:active { transform: scale(.98); }
        .btn-enter:disabled { opacity: .5; cursor: not-allowed; }

        /* Erro */
        .erro {
            display: none; background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.3); color: #f87171;
            border-radius: 10px; padding: .6rem .85rem;
            font-size: .82rem; margin-bottom: 1rem;
            align-items: flex-start; gap: .5rem;
        }
        .erro.on { display: flex; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin .8s linear infinite; }
    </style>
</head>
<body>

    <div class="brand">
        <div class="brand-icon"><span class="material-icons-round">warehouse</span></div>
        <h1>WMS Coletor</h1>
        <p>ParreiraLog — Enterprise Platform</p>
    </div>

    <div class="card">
        <h2>Entrar no coletor</h2>

        <div class="erro" id="erro">
            <span class="material-icons-round" style="font-size:1rem;flex-shrink:0;">error_outline</span>
            <span id="erroMsg"></span>
        </div>

        <div class="field">
            <label for="inpUser">Usuário</label>
            <div class="fi">
                <span class="material-icons-round">person</span>
                <input type="text" id="inpUser" placeholder="seu.login"
                    autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"
                    onkeydown="if(event.key==='Enter')doLogin()">
            </div>
        </div>

        <div class="field">
            <label for="inpSenha">Senha</label>
            <div class="fi">
                <span class="material-icons-round">lock</span>
                <input type="password" id="inpSenha" placeholder="••••••••"
                    autocomplete="current-password"
                    onkeydown="if(event.key==='Enter')doLogin()">
            </div>
        </div>

        <button class="btn-enter" id="btnEntrar" onclick="doLogin()">
            <span class="material-icons-round">login</span> Entrar
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="../../core/js/session-manager.js"></script>
    <script src="../../core/js/auth.js"></script>
    <script>
        if (ParreiraAuth.isLogado()) window.location.href = 'index.html';

        async function doLogin() {
            const usuario = document.getElementById('inpUser').value.trim();
            const senha   = document.getElementById('inpSenha').value;
            const btn     = document.getElementById('btnEntrar');
            const erroEl  = document.getElementById('erro');
            const erroMsg = document.getElementById('erroMsg');

            erroEl.classList.remove('on');

            if (!usuario || !senha) {
                erroMsg.textContent = 'Preencha usuário e senha.';
                erroEl.classList.add('on'); return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="material-icons-round spin">sync</span> Entrando...';

            try {
                await ParreiraAuth.login(usuario, senha, 'wms-coletor');
                window.location.href = 'index.html';
            } catch(e) {
                erroMsg.textContent = e.message || 'Usuário ou senha inválidos.';
                erroEl.classList.add('on');
                btn.disabled = false;
                btn.innerHTML = '<span class="material-icons-round">login</span> Entrar';
            }
        }
    </script>
</body>
</html>
