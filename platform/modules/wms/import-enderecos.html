<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Importar Endereços — WMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; display: flex;
            align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 2rem; max-width: 560px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
        h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: .35rem;
            display: flex; align-items: center; gap: .5rem; }
        .sub { font-size: .82rem; color: #94a3b8; margin-bottom: 1.5rem; }
        .stat-row { display: flex; gap: .75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
        .stat { background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.25);
            border-radius: 10px; padding: .65rem 1rem; flex: 1; text-align: center; }
        .stat-val { font-size: 1.6rem; font-weight: 800; color: #818cf8; }
        .stat-lbl { font-size: .68rem; color: #64748b; margin-top: .1rem; }
        .btn { width: 100%; padding: .9rem; border: none; border-radius: 10px; cursor: pointer;
            font-size: .95rem; font-weight: 700; font-family: inherit;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff; transition: all .2s; display: flex; align-items: center;
            justify-content: center; gap: .5rem; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,.4); }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
        .progress { background: #0f172a; border-radius: 8px; height: 8px; overflow: hidden; margin: 1rem 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #6366f1, #10b981);
            width: 0%; transition: width .3s; border-radius: 8px; }
        #log { background: #0f172a; border-radius: 8px; padding: .75rem 1rem;
            font-size: .75rem; font-family: monospace; color: #64748b;
            max-height: 200px; overflow-y: auto; margin-top: 1rem; line-height: 1.7; }
        .badge { display: inline-block; padding: .15rem .5rem; border-radius: 4px;
            font-size: .7rem; font-weight: 700; }
        .badge-p { background: rgba(16,185,129,.15); color: #10b981; }
        .badge-b { background: rgba(245,158,11,.15); color: #f59e0b; }
        a.back { display: block; text-align: center; color: #64748b; font-size: .8rem;
            text-decoration: none; margin-top: 1rem; }
        a.back:hover { color: #94a3b8; }
    </style>
</head>
<body>
<div class="card">
    <h1>📦 Importar Endereços para o WMS</h1>
    <p class="sub">Carregando 12.349 endereços do arquivo <strong>endereços.xlsx</strong> convertido.</p>

    <div class="stat-row">
        <div class="stat">
            <div class="stat-val">12.349</div>
            <div class="stat-lbl">Total de Endereços</div>
        </div>
        <div class="stat">
            <div class="stat-val">9</div>
            <div class="stat-lbl">Ruas (Corredores)</div>
        </div>
        <div class="stat">
            <div class="stat-val">8</div>
            <div class="stat-lbl">Níveis</div>
        </div>
    </div>

    <div style="font-size:.8rem;color:#94a3b8;margin-bottom:1rem;
        background:rgba(16,185,129,.06);border-left:3px solid #10b981;padding:.65rem .85rem;border-radius:6px;">
        <strong>Tipos:</strong>
        <span class="badge badge-p">Picking</span>
        <span class="badge badge-b">Pulmão</span>
        &nbsp; — todos com status <strong>LIVRE</strong>
    </div>

    <button id="btnImport" class="btn" onclick="startImport()">
        <span>⬇️</span> Importar para o WMS agora
    </button>

    <div class="progress" style="display:none;" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="statusMsg" style="font-size:.82rem;text-align:center;margin-top:.5rem;color:#94a3b8;display:none;"></div>

    <div id="log">Aguardando importação...</div>

    <a class="back" href="index.html">← Voltar para o WMS</a>
</div>

<script>
async function startImport() {
    const btn = document.getElementById('btnImport');
    btn.disabled = true;
    btn.innerHTML = '⏳ Carregando dados...';
    log('Buscando enderecos_import.json...');

    try {
        const resp = await fetch('enderecos_import.json?v=' + Date.now());
        if (!resp.ok) throw new Error('Arquivo não encontrado: ' + resp.status);
        const locations = await resp.json();

        log(`✅ ${locations.length} endereços carregados do JSON.`);
        document.getElementById('progressWrap').style.display = 'block';
        document.getElementById('statusMsg').style.display = 'block';
        btn.innerHTML = '⚙️ Importando...';

        // Get current data
        const key = 'wms_mock_data';
        const existing = JSON.parse(localStorage.getItem(key) || '[]');
        const existingIds = new Set(existing.map(l => l.id));
        log(`📂 Já existem ${existing.length} endereços no sistema.`);

        const newLocs = locations.filter(l => !existingIds.has(l.id));
        const dupes   = locations.length - newLocs.length;
        log(`🆕 Novos: ${newLocs.length} | ⚠️ Duplicados ignorados: ${dupes}`);

        // Save in chunks to avoid UI freeze
        const CHUNK = 500;
        let merged = [...existing];
        for (let i = 0; i < newLocs.length; i += CHUNK) {
            merged = [...merged, ...newLocs.slice(i, i + CHUNK)];
            const pct = Math.min(100, Math.round((i / newLocs.length) * 100));
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('statusMsg').textContent = `Salvando... ${i+CHUNK > newLocs.length ? newLocs.length : i+CHUNK} / ${newLocs.length}`;
            await new Promise(r => setTimeout(r, 5)); // yield to UI
        }

        localStorage.setItem(key, JSON.stringify(merged));
        document.getElementById('progressBar').style.width = '100%';

        log(`✅ Importação concluída! ${newLocs.length} endereços adicionados ao WMS.`);
        log(`📊 Total no sistema agora: ${merged.length}`);

        btn.className = 'btn btn-success';
        btn.disabled = false;
        btn.innerHTML = '✅ Importado! Ir para o WMS';
        btn.onclick = () => window.location.href = 'index.html';
        document.getElementById('statusMsg').textContent = 'Concluído com sucesso!';
        document.getElementById('statusMsg').style.color = '#10b981';

    } catch(e) {
        log('❌ ERRO: ' + e.message);
        btn.disabled = false;
        btn.innerHTML = '⬇️ Tentar novamente';
        btn.onclick = startImport;
    }
}

function log(msg) {
    const el = document.getElementById('log');
    const time = new Date().toLocaleTimeString('pt-BR');
    el.innerHTML += `<div>[${time}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
}
</script>
</body>
</html>
