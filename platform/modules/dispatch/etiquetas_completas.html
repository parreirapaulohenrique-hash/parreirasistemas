<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiquetas Completas com Código 14 Dígitos</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
<style>
  @page {
    margin: 5mm;
  }
  body { 
    font-family: Arial, sans-serif; 
    background: #f4f4f4;
    padding: 0;
    margin: 0;
  }
  .page {
    width: 210mm;
    background: white;
    margin: 20px auto;
    padding: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .label {
    padding: 12px;
    border-right: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    height: 145px;
    overflow: hidden;
  }
  .label:nth-child(4n) {
    border-right: none;
  }
  .title {
    font-size: 10px;
    font-weight: bold;
    margin-bottom: 2px;
  }
  .desc {
    font-size: 8px;
    margin-bottom: 8px;
    text-transform: uppercase;
    min-height: 20px;
    line-height: 1.2;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    margin-bottom: 2px;
    font-weight: bold;
  }
  .barcode-container {
    text-align: center;
    margin-top: auto;
  }
  svg {
    max-width: 100%;
    height: 35px;
  }
  .barcode-text {
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 2px;
    text-align: center;
    margin-top: -2px;
  }
  @media print {
    body { background: white; }
    .page { box-shadow: none; margin: 0; page-break-after: always; border: none; }
    .label { border-right: 1px dashed #ccc; border-bottom: 1px dashed #ccc; }
    .label:nth-child(4n) { border-right: none; }
  }
  
  .print-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 30px;
      background: #007bff;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  }
  .print-btn:hover { background: #0056b3; }
  @media print { .print-btn { display: none; } }
</style>
</head>

<div id="pages-container"></div>

  const container = document.getElementById("pages-container");
  
  // Creates pages with 20 labels each (5 rows, 4 cols)
  for(let i=0; i<labelsData.length; i+=20) {
      const pageData = labelsData.slice(i, i+20);
      const pageDiv = document.createElement("div");
      pageDiv.className = "page";
      
      pageData.forEach(item => {
          const [desc, ref, cod, ender, barcode] = item;
          
          const labelDiv = document.createElement("div");
          labelDiv.className = "label";
          
          const enderText = ender ? "Ender.: " + ender : "Ender.:";
          
          labelDiv.innerHTML = `
            <div class="title">LT DISTRIBUIDORA PECAS MOTOS</div>
            <div class="desc">${desc}</div>
            <div class="info-row">
              <span>Ref.: ${ref}</span>
              <span>Cód.: ${cod}</span>
            </div>
            <div class="info-row">
              <span>Marca: LCT +</span>
              <span>${enderText}</span>
            </div>
            <div class="barcode-container">
               <svg class="barcode" data-code="${barcode}"></svg>
               <div class="barcode-text">${barcode}</div>
            </div>
          `;
          
          pageDiv.appendChild(labelDiv);
      });
      
      container.appendChild(pageDiv);
  }

  document.querySelectorAll('.barcode').forEach(svg => {
      const code = svg.getAttribute('data-code');
      JsBarcode(svg, code, {
        format: "CODE128", 
        lineColor: "#000",
        width: 1.5,
        height: 35,
        displayValue: false, 
        margin: 0
      });
  });
</script>
</body>
</html>
