<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Firebase - ParreiraLog Despacho</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #eee; padding: 20px; }
        .log { padding: 10px; margin: 5px 0; border-radius: 4px; border-left: 5px solid #555; background: #333; }
        .success { border-left-color: #0f0; background: #1a331a; }
        .error { border-left-color: #f00; background: #331a1a; }
        .info { border-left-color: #00aaff; background: #1a1a33; }
        .warn { border-left-color: #ffaa00; background: #332a1a; }
        h1 { color: #ccc; }
        button { background: #3b82f6; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 5px; }
        input { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; border-radius: 6px; font-size: 1rem; width: 300px; }
        label { color: #aaa; display: block; margin-bottom: 4px; }
    </style>

    <!-- Firebase SDK v8 compat -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
    <h1>🛠️ Diagnóstico Firebase - Módulo Despacho</h1>

    <div style="background:#222; padding:15px; border-radius:8px; margin-bottom:15px;">
        <label>Tenant ID (ID da Empresa que quer verificar):</label>
        <input type="text" id="tenantInput" value="ltdistribuidora" placeholder="ex: ltdistribuidora" />
        <br><br>
        <button onclick="runTests()">🔍 Executar Diagnóstico</button>
        <button onclick="document.getElementById('logs').innerHTML=''">🧹 Limpar</button>
    </div>

    <div id="logs"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDzatCQ8zmH4aQftznf7Y5wdYPwFYSiARc",
            authDomain: "parreiralog-91904.firebaseapp.com",
            projectId: "parreiralog-91904",
            messagingSenderId: "527633267616",
            appId: "1:527633267616:web:3567e883b31f7fa02882c5"
        };

        const logDiv = document.getElementById('logs');
        function log(msg, type = 'info') {
            const el = document.createElement('div');
            el.className = `log ${type}`;
            el.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${msg}`;
            logDiv.prepend(el);
        }

        async function runTests() {
            const tenantId = document.getElementById('tenantInput').value.trim();
            if (!tenantId) { log('❌ Informe o Tenant ID!', 'error'); return; }

            log(`--- INICIANDO DIAGNÓSTICO PARA TENANT: "${tenantId}" ---`, 'warn');

            // 1. Init Firebase
            let db;
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                log('✅ Firebase inicializado.', 'success');
            } catch(e) {
                log(`❌ Erro ao inicializar Firebase: ${e.message}`, 'error');
                return;
            }

            // 2. Auth
            try {
                const cred = await firebase.auth().signInAnonymously();
                log(`✅ Autenticado. UID: ${cred.user.uid.substr(0,8)}...`, 'success');
            } catch(e) {
                log(`❌ Falha na autenticação anônima: ${e.message}`, 'error');
                return;
            }

            // 3. Verificar coleção correta com tenantId
            const keys = ['dispatches', 'freight_tables', 'carrier_list', 'carrier_configs', 'company_data', 'app_users', 'clients', 'app_romaneios'];
            log(`🔍 Verificando coleção: tenants/${tenantId}/legacy_store/`, 'info');

            for (const key of keys) {
                try {
                    const doc = await db.collection('tenants').doc(tenantId).collection('legacy_store').doc(key).get();
                    if (doc.exists) {
                        const data = doc.data();
                        const size = data.content ? data.content.length : 0;
                        const preview = data.content ? data.content.substring(0, 80) + '...' : '(sem conteúdo)';
                        const updatedAt = data.updatedAt ? data.updatedAt.toDate().toLocaleString('pt-BR') : 'sem data';
                        log(`✅ <b>${key}</b>: ${size} chars | Última atualização: ${updatedAt}<br><small style="color:#aaa">${preview}</small>`, 'success');
                    } else {
                        log(`⚠️ <b>${key}</b>: NÃO ENCONTRADO no Firebase para tenant "${tenantId}"`, 'warn');
                    }
                } catch(e) {
                    log(`❌ <b>${key}</b>: Erro - ${e.message}`, 'error');
                }
            }

            // 4. Verificar também no tenant "parreiralog" (legado)
            log(`🔍 Verificando também no tenant legado: "parreiralog"`, 'info');
            try {
                const legacyDoc = await db.collection('tenants').doc('parreiralog').collection('legacy_store').doc('dispatches').get();
                if (legacyDoc.exists) {
                    const d = legacyDoc.data();
                    const updatedAt = d.updatedAt ? d.updatedAt.toDate().toLocaleString('pt-BR') : 'sem data';
                    log(`⚠️ "dispatches" ENCONTRADO em "parreiralog" (tenant legado)! ${d.content ? d.content.length : 0} chars | ${updatedAt}`, 'warn');
                } else {
                    log(`ℹ️ "dispatches" não existe em "parreiralog" também.`, 'info');
                }
            } catch(e) {
                log(`❌ Erro ao checar tenant legado: ${e.message}`, 'error');
            }

            log('--- DIAGNÓSTICO FINALIZADO ---', 'warn');
        }
    </script>
</body>
</html>
