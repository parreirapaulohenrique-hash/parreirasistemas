<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParreiraLog — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#0f172a; --card:#1e293b; --border:rgba(255,255,255,.08); --primary:#0ea5e9; --text:#f1f5f9; --sec:#94a3b8; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        body::before {
            content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
            background: radial-gradient(ellipse at 20% 50%, rgba(14,165,233,.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(168,85,247,.08) 0%, transparent 50%);
        }
        .wrap { position:relative; z-index:1; width:100%; max-width:400px; }
        .brand { text-align:center; margin-bottom:2rem; }
        .brand-icon {
            width:64px; height:64px; border-radius:16px;
            background:linear-gradient(135deg,#0ea5e9,#2563eb);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 1rem; box-shadow:0 8px 24px rgba(14,165,233,.35);
        }
        .brand-icon .material-icons-round { font-size:2rem; color:#fff; }
        .brand h1 { font-size:1.4rem; font-weight:700; }
        .brand p  { font-size:.82rem; color:var(--sec); margin-top:.25rem; }
        .card {
            background:var(--card); border:1px solid var(--border);
            border-radius:16px; padding:2rem;
            box-shadow:0 20px 60px rgba(0,0,0,.4);
        }
        .card h2 { font-size:1.1rem; font-weight:600; margin-bottom:1.5rem; }
        .field { margin-bottom:1rem; }
        .field label { display:block; font-size:.78rem; font-weight:500; color:var(--sec); margin-bottom:.4rem; }
        .fi { position:relative; display:flex; align-items:center; }
        .fi .material-icons-round { position:absolute; left:.75rem; font-size:1.1rem; color:var(--sec); pointer-events:none; }
        .fi input {
            width:100%; background:rgba(255,255,255,.05); border:1px solid var(--border);
            border-radius:8px; color:var(--text); font-family:inherit; font-size:.9rem;
            padding:.7rem .75rem .7rem 2.6rem; transition:border-color .2s; outline:none;
        }
        .fi input:focus { border-color:var(--primary); }
        .fi input::placeholder { color:rgba(255,255,255,.2); }
        .btn-login {
            width:100%; background:var(--primary); color:#fff; border:none;
            border-radius:8px; font-family:inherit; font-size:.95rem; font-weight:600;
            padding:.8rem; cursor:pointer; margin-top:.5rem;
            display:flex; align-items:center; justify-content:center; gap:.5rem;
            transition:background .2s; box-shadow:0 4px 16px rgba(14,165,233,.3);
        }
        .btn-login:hover { background:#0284c7; }
        .btn-login:disabled { opacity:.6; cursor:not-allowed; }
        .erro {
            display:none; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
            color:#f87171; border-radius:8px; padding:.65rem .85rem;
            font-size:.82rem; margin-bottom:1rem;
            align-items:center; gap:.5rem;
        }
        .erro.on { display:flex; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .spin { animation:spin .8s linear infinite; }
        footer { text-align:center; margin-top:1.5rem; font-size:.72rem; color:var(--sec); }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-icon"><span class="material-icons-round">hub</span></div>
        <h1>ParreiraLog</h1>
        <p>Enterprise Platform</p>
    </div>

    <div class="card">
        <h2>Entrar na plataforma</h2>

        <div class="erro" id="erro">
            <span class="material-icons-round" style="font-size:1rem;flex-shrink:0;">error_outline</span>
            <span id="erroMsg"></span>
        </div>

        <div class="field">
            <label for="inpLogin">Usuário</label>
            <div class="fi">
                <span class="material-icons-round">person</span>
                <input type="text" id="inpLogin" placeholder="seu.login"
                    autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"
                    onkeydown="if(event.key==='Enter')doLogin()">
            </div>
        </div>

        <div class="field">
            <label for="inpSenha">Senha</label>
            <div class="fi">
                <span class="material-icons-round">lock</span>
                <input type="password" id="inpSenha" placeholder="••••••"
                    autocomplete="current-password"
                    onkeydown="if(event.key==='Enter')doLogin()">
            </div>
        </div>

        <button class="btn-login" id="btnEntrar" onclick="doLogin()">
            <span class="material-icons-round">login</span> Entrar
        </button>
    </div>

    <footer>© 2025 Parreira Sistemas · Todos os direitos reservados</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="core/js/auth.js"></script>
<script>
    if (ParreiraAuth.isLogado()) window.location.href = 'modules/wms/index.html';

    async function doLogin() {
        const login = document.getElementById('inpLogin').value.trim();
        const senha = document.getElementById('inpSenha').value;
        const btn   = document.getElementById('btnEntrar');
        const erro  = document.getElementById('erro');
        const msg   = document.getElementById('erroMsg');

        erro.classList.remove('on');
        if (!login || !senha) { msg.textContent='Preencha usuário e senha.'; erro.classList.add('on'); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="material-icons-round spin">sync</span> Entrando...';

        try {
            await ParreiraAuth.login(login, senha);
            window.location.href = 'modules/wms/index.html';
        } catch(e) {
            msg.textContent = e.message || 'Erro ao fazer login.';
            erro.classList.add('on');
            btn.disabled = false;
            btn.innerHTML = '<span class="material-icons-round">login</span> Entrar';
        }
    }
</script>
</body>
</html>
